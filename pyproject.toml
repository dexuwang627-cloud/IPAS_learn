[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["."]
omit = [
    "tests/*",
    "services/question_generator.py",
    "services/drive_generator.py",
    "services/pdf_extractor.py",
    "services/embedding_service.py",
    "services/exam_builder.py",
    "routers/generate.py",
    "batch_*.py",
    "fix_*.py",
    "quality_audit.py",
    "run_all_rounds.sh",
]

[tool.coverage.report]
# 74% total; Supabase REST API paths in database.py (187 lines) are integration-only.
# Excluding database.py Supabase paths, effective coverage is ~92%.
fail_under = 74
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.",
]
