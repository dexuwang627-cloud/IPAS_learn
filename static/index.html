<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPAS 碳管理測驗系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
<canvas id="noise-canvas"></canvas>

<div class="app-wrapper">
  <header>
    <h1>iPAS <span>//</span> CARBON</h1>
    <p>碳管理能力鑑定 模擬測驗系統</p>
  </header>

  <!-- Auth Screen -->
  <div id="auth-screen" class="auth-screen hidden">
    <div class="card">
      <h2 id="auth-title">// LOGIN</h2>
      <div id="auth-error" class="auth-error"></div>
      <div id="auth-success" class="auth-success"></div>
      <input type="email" id="auth-email" class="auth-input" placeholder="Email" autocomplete="email" aria-label="Email">
      <input type="password" id="auth-password" class="auth-input" placeholder="Password (min 6 chars)" autocomplete="current-password" aria-label="Password">
      <button class="btn btn-primary btn-block" id="btn-auth" type="button">LOGIN</button>
      <div style="display:flex;align-items:center;gap:12px;margin:16px 0 12px;">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        <span style="font-family:var(--mono);font-size:11px;color:var(--text-muted);">OR</span>
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>
      <button class="btn btn-outline btn-block" id="btn-google" type="button" style="gap:8px;">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <div class="auth-toggle" id="auth-toggle">
        <a onclick="toggleAuthMode()">註冊</a>
      </div>
    </div>
  </div>

  <!-- User Bar -->
  <div id="user-bar" class="user-bar hidden">
    <span class="user-email" id="user-email"></span>
    <button class="btn-logout" id="btn-logout" type="button">LOGOUT</button>
  </div>

  <div id="main-app" class="hidden">
  <div class="tabs">
    <div class="tab active" data-tab="quiz">測驗</div>
    <div class="tab" data-tab="weakness">弱點分析</div>
    <div class="tab" data-tab="notebook">錯題本</div>
    <div class="tab" data-tab="dashboard">數據</div>
    <div class="tab" data-tab="bank">題庫</div>
  </div>

  <!-- Quiz Tab -->
  <div id="tab-quiz">
    <div id="quiz-setup" class="card">
      <h2>// QUIZ CONFIG</h2>
      <div id="stats-bar" class="stats"></div>
      <div class="form-row">
        <div>
          <label>章節 Chapter</label>
          <select id="sel-chapter"><option value="">全部章節</option></select>
        </div>
        <div>
          <label>難度 Difficulty</label>
          <select id="sel-difficulty">
            <option value="">不限</option>
            <option value="1">Lv.1 基礎</option>
            <option value="2">Lv.2 中等</option>
            <option value="3">Lv.3 進階</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div><label>單選題</label><input type="number" id="num-choice" value="10" min="0" max="50"></div>
        <div><label>是非題</label><input type="number" id="num-tf" value="5" min="0" max="30"></div>
      </div>
      <div class="form-row">
        <div><label>複選題</label><input type="number" id="num-mc" value="3" min="0" max="20"></div>
        <div><label>情境題組</label><input type="number" id="num-scenario" value="1" min="0" max="10"></div>
      </div>
      <div class="form-row" style="margin-top:8px;">
        <div>
          <label>Exam Duration (min)</label>
          <select id="exam-duration">
            <option value="30">30 min</option>
            <option value="60" selected>60 min</option>
            <option value="90">90 min</option>
            <option value="120">120 min</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:12px;">
        <button class="btn btn-primary" style="flex:1" id="btn-start" onclick="startQuiz()">PRACTICE</button>
        <button class="btn btn-outline" style="flex:1;border-color:var(--warn);color:var(--warn);" id="btn-start-exam" onclick="startExam()">EXAM MODE</button>
      </div>
    </div>

    <div id="exam-timer" class="hidden" style="position:fixed;top:16px;right:16px;z-index:100;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent);"></div>

    <div id="quiz-area" class="hidden">
      <div id="questions-list"></div>
      <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
        <button class="btn btn-primary" onclick="handleSubmit()">SUBMIT</button>
        <button class="btn btn-outline" onclick="resetQuiz()">RESET</button>
      </div>
    </div>

    <div id="quiz-result" class="hidden"></div>
  </div>

  <!-- Weakness Tab -->
  <div id="tab-weakness" class="hidden">
    <div class="card">
      <h2>// WEAKNESS ANALYSIS</h2>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
        根據作答紀錄分析各章節正確率，找出需要加強的部分
      </p>
      <div id="weakness-content"></div>
    </div>
    <div class="card" id="weakness-detail-card" class="hidden">
      <h2>// WRONG ANSWERS LOG</h2>
      <div id="weakness-log"></div>
    </div>
  </div>

  <!-- Notebook Tab -->
  <div id="tab-notebook" class="hidden">
    <div class="card">
      <h2>// WRONG ANSWER NOTEBOOK</h2>
      <div id="notebook-stats" class="stats-row"></div>
      <div class="notebook-filters" style="display:flex;gap:8px;margin:12px 0;">
        <button class="notebook-filter-btn active" data-filter="all" onclick="filterNotebook('all')">All</button>
        <button class="notebook-filter-btn" data-filter="bookmarked" onclick="filterNotebook('bookmarked')">Bookmarked</button>
        <button class="notebook-filter-btn" data-filter="quiz" onclick="filterNotebook('quiz')">Quiz</button>
        <button class="notebook-filter-btn" data-filter="exam" onclick="filterNotebook('exam')">Exam</button>
        <div style="margin-left:auto;">
          <select id="notebook-sort" onchange="sortNotebook(this.value)" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:12px;">
            <option value="recent">Most Recent</option>
            <option value="frequency">Most Wrong</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" id="btn-notebook-practice" onclick="startNotebookPractice()" style="margin-bottom:12px;">PRACTICE FROM NOTEBOOK</button>
    </div>
    <div id="notebook-list"></div>
  </div>

  <!-- Dashboard Tab -->
  <div id="tab-dashboard" class="hidden">
    <div class="card">
      <h2>// LEARNING DASHBOARD</h2>
      <div id="dashboard-summary" class="stats-row"></div>
    </div>
    <div class="card">
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button class="granularity-btn active" data-granularity="day" onclick="toggleGranularity('day')">Day</button>
        <button class="granularity-btn" data-granularity="week" onclick="toggleGranularity('week')">Week</button>
      </div>
      <div style="height:250px;"><canvas id="chart-accuracy"></canvas></div>
    </div>
    <div class="card">
      <div style="height:200px;"><canvas id="chart-volume"></canvas></div>
    </div>
    <div class="card">
      <div style="height:300px;"><canvas id="chart-chapters"></canvas></div>
    </div>
  </div>

  <!-- Bank Tab -->
  <div id="tab-bank" class="hidden">
    <div class="card">
      <h2>// QUESTION BANK</h2>
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <input type="text" id="search-input" placeholder="搜尋題目..." style="flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:var(--bg);color:var(--text);outline:none;">
        <button class="btn btn-primary btn-sm" onclick="doSearch()">SEARCH</button>
      </div>
      <div id="search-results"></div>
      <div class="form-row">
        <div>
          <label>章節</label>
          <select id="bank-chapter"><option value="">全部</option></select>
        </div>
        <div>
          <label>難度</label>
          <select id="bank-diff">
            <option value="">全部</option>
            <option value="1">Lv.1</option>
            <option value="2">Lv.2</option>
            <option value="3">Lv.3</option>
          </select>
        </div>
        <div>
          <label>題型</label>
          <select id="bank-type">
            <option value="">全部</option>
            <option value="choice">單選</option>
            <option value="truefalse">是非</option>
            <option value="multichoice">複選</option>
            <option value="scenario_choice">情境單選</option>
            <option value="scenario_multichoice">情境複選</option>
          </select>
        </div>
        <div style="display:flex;align-items:flex-end;">
          <button class="btn btn-primary btn-sm" onclick="loadBank()">QUERY</button>
        </div>
      </div>
    </div>
    <div id="bank-list"></div>
  </div>

  </div><!-- /main-app -->
</div>

<script type="module" src="/static/js/app.js"></script>
</body>
</html>
